name: Build Sadi AI Secretary APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show what files exist
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== ZIP files ==="
          find . -name "*.zip" 2>/dev/null

      - name: Extract ZIP if needed
        run: |
          # ZIP file খুঁজে extract করো
          ZIP=$(find . -name "*.zip" | head -1)
          if [ -n "$ZIP" ]; then
            echo "Found ZIP: $ZIP — extracting..."
            unzip -o "$ZIP" -d extracted/
            echo "=== Extracted contents ==="
            ls -la extracted/
            # settings.gradle কোথায় আছে খোঁজো
            SETTINGS=$(find extracted/ -name "settings.gradle" | head -1)
            echo "settings.gradle found at: $SETTINGS"
            # সেই directory তে যাও
            PROJ_DIR=$(dirname "$SETTINGS")
            echo "Project dir: $PROJ_DIR"
            # Project files root এ copy করো
            cp -r "$PROJ_DIR"/. .
            echo "=== After copy ==="
            ls -la
          else
            echo "No ZIP found — files already extracted"
          fi
          # Final check
          echo "=== settings.gradle check ==="
          find . -name "settings.gradle" 2>/dev/null

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=8.2
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Xmx2g -Dorg.gradle.daemon=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sadi-AI-Secretary-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
